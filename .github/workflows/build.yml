name: Build 1.21.11 Mod (国内优化版)
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (1.21.11强制要求)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 自动缓存依赖，第二次构建快10倍

      - name: 配置Gradle国内镜像源
        run: |
          mkdir -p ~/.gradle
          echo "systemProp.http.proxyHost=mirrors.aliyun.com" >> ~/.gradle/gradle.properties
          echo "systemProp.http.proxyPort=80" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties

      - name: 给Gradle脚本授权
        run: chmod +x ./gradlew

      - name: 自动编译Mod
        run: ./gradlew build --no-daemon --stacktrace

      - name: 上传编译好的Mod文件
        uses: actions/upload-artifact@v4
        with:
          name: 1.21.11-Mod-成品
          path: build/libs/*.jar
          retention-days: 30 # 保留30天
